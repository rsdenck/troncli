name: DCO Check

on:
  pull_request:
    branches: [ main, dev, release/* ]

jobs:
  dco:
    name: Developer Certificate of Origin
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Check DCO
      uses: tim-actions/dco@v1
      with:
        commits: ${{ github.event.pull_request.commits }}
