version: 2
project_name: nux

builds:
  - main: ./cmd/nux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - 7
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - formats: 
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    files:
      - LICENSE
      - README.md
      - docs/

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

nfpm:
  - file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}{{ if .Arm }}v{{ .Arm }}{{ end }}"
    homepage: https://github.com/rsdenck/nux
    maintainer: "Ranlens Denck <piptr@protonmail.com>"
    description: "NUX - Production-Grade Linux CLI Manager"
    license: "MIT"
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/local/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/nux/LICENSE
      - src: README.md
        dst: /usr/share/doc/nux/README.md
      - src: docs/index.html
        dst: /usr/share/nux/docs/index.html

release:
  draft: false
  prerelease: false
  github:
    owner: rsdenck
    name: nux
